<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Yoshida 辛积分三体 - PixiJS版</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/pixi.js/7.4.0/pixi.min.js"></script>
    <style>
      :root {
        --font-size-base: clamp(12px, 1vw + 0.5rem, 18px);
        --font-size-sm: clamp(10px, 0.8vw + 0.4rem, 14px);
        --font-size-xs: clamp(9px, 0.7vw + 0.3rem, 12px);
        --spacing-xs: clamp(0.125rem, 0.3vw, 0.25rem);
        --spacing-sm: clamp(0.25rem, 0.5vw, 0.625rem);
        --spacing-md: clamp(0.5rem, 1vw, 1rem);
        --spacing-lg: clamp(0.75rem, 1.5vw, 1.5rem);
        --spacing-xl: clamp(1rem, 2vw, 2rem);
        --panel-width: clamp(280px, 28vw, 480px);
        --panel-max-width: 92vw;
        --toggle-btn-size: clamp(2.5rem, 3.5vw, 4rem);
        --border-radius-sm: clamp(0.25rem, 0.4vw, 0.5rem);
        --border-radius-md: clamp(0.375rem, 0.5vw, 0.75rem);
        --border-radius-lg: clamp(0.5rem, 0.8vw, 1rem);
        --input-height: clamp(1.5rem, 2.5vw, 2rem);
        --btn-height: clamp(1.75rem, 2.8vw, 2.5rem);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: var(--font-size-base);
      }
      body {
        background: #000;
        overflow: hidden;
        font-family: Arial, sans-serif;
        font-size: 1rem;
      }
      #canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      .panel-container {
        position: fixed;
        top: var(--spacing-lg);
        z-index: 100;
        cursor: move;
        user-select: none;
      }
      .panel-container.right {
        right: var(--spacing-lg);
      }
      .panel-container.left {
        left: var(--spacing-lg);
      }
      .toggle-btn {
        width: var(--toggle-btn-size);
        height: var(--toggle-btn-size);
        background: linear-gradient(135deg, #3a3a3a 0%, #2a2a2a 100%);
        border: 0.125rem solid #555;
        border-radius: 50%;
        color: #fff;
        cursor: pointer;
        font-size: 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 0.25rem 1.25rem rgba(0, 0, 0, 0.5),
          0 0 1.875rem rgba(100, 100, 100, 0.1);
        transition: all 0.3s ease;
        position: relative;
        z-index: 10;
      }
      .toggle-btn:hover {
        background: linear-gradient(135deg, #4a4a4a 0%, #3a3a3a 100%);
        box-shadow:
          0 0.375rem 1.5625rem rgba(0, 0, 0, 0.6),
          0 0 2.5rem rgba(100, 100, 100, 0.2);
        transform: scale(1.05);
      }
      .toggle-btn.expanded {
        position: absolute;
        right: 0;
        top: 0;
      }
      .toggle-btn.info-expanded {
        position: absolute;
        left: 0;
        top: 0;
      }
      .panel-base {
        width: var(--panel-width);
        max-width: var(--panel-max-width);
        max-height: 85vh;
        background: rgba(25, 25, 30, 0.97);
        overflow-y: auto;
        padding: var(--spacing-lg);
        padding-top: calc(var(--toggle-btn-size) + var(--spacing-lg));
        border-radius: var(--border-radius-lg);
        border: 0.0625rem solid #444;
        box-shadow: 0 0.5rem 2.5rem rgba(0, 0, 0, 0.6);
        opacity: 0;
        transform: scale(0.8);
        position: absolute;
        top: 0;
        pointer-events: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .panel-base.show {
        opacity: 1;
        transform: scale(1);
        pointer-events: auto;
      }
      .control-panel {
        transform-origin: top right;
        right: 0;
      }
      .info-panel {
        transform-origin: top left;
        left: 0;
      }
      .panel-base::-webkit-scrollbar {
        width: 0.375rem;
      }
      .panel-base::-webkit-scrollbar-track {
        background: #1a1a1a;
        border-radius: 0.1875rem;
      }
      .panel-base::-webkit-scrollbar-thumb {
        background: #555;
        border-radius: 0.1875rem;
      }
      .panel-base::-webkit-scrollbar-thumb:hover {
        background: #666;
      }
      .btn-group {
        display: flex;
        gap: var(--spacing-sm);
        margin-bottom: var(--spacing-md);
        flex-wrap: nowrap;
      }
      .btn-group button {
        flex: 1;
        min-width: clamp(3rem, 8vw, 4rem);
        height: var(--btn-height);
        padding: 0 clamp(0.5rem, 1vw, 0.75rem);
        background: linear-gradient(135deg, #3a3a3a 0%, #2a2a2a 100%);
        color: #ddd;
        border: 0.0625rem solid #4a4a4a;
        border-radius: var(--border-radius-sm);
        cursor: pointer;
        font-size: var(--font-size-sm);
        font-weight: 500;
        transition: all 0.25s ease;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.2);
      }
      .btn-group button:hover {
        background: linear-gradient(135deg, #4a4a4a 0%, #3a3a3a 100%);
        border-color: #5a5a5a;
        transform: translateY(-0.0625rem);
        box-shadow: 0 0.25rem 0.5rem rgba(0, 0, 0, 0.3);
      }
      .btn-group button:active {
        transform: translateY(0);
        box-shadow: 0 0.0625rem 0.125rem rgba(0, 0, 0, 0.2);
      }
      #start {
        border-color: #2a5a2a;
      }
      #start:hover {
        background: linear-gradient(135deg, #3a6a3a 0%, #2a5a2a 100%);
      }
      #stop {
        border-color: #5a2a2a;
      }
      #stop:hover {
        background: linear-gradient(135deg, #6a3a3a 0%, #5a2a2a 100%);
      }
      #reset {
        border-color: #2a3a5a;
      }
      #reset:hover {
        background: linear-gradient(135deg, #3a4a6a 0%, #2a3a5a 100%);
      }
      #restore {
        border-color: #4a3a2a;
      }
      #restore:hover {
        background: linear-gradient(135deg, #5a4a3a 0%, #4a3a2a 100%);
      }
      .body-controls {
        margin-bottom: var(--spacing-md);
        padding: var(--spacing-md);
        background: linear-gradient(135deg, #2a2a2a 0%, #252525 100%);
        border-radius: var(--border-radius-sm);
        border: 0.0625rem solid #3a3a3a;
        transition: all 0.25s ease;
      }
      .body-controls:hover {
        border-color: #4a4a4a;
      }
      .body-controls h4 {
        margin: 0 0 var(--spacing-sm);
        color: #ddd;
        font-size: var(--font-size-sm);
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
      }
      .bodies-container {
        margin-bottom: var(--spacing-md);
        padding: var(--spacing-md);
        background: linear-gradient(135deg, #2a2a2a 0%, #252525 100%);
        border-radius: var(--border-radius-sm);
        border: 0.0625rem solid #3a3a3a;
      }
      .bodies-header,
      .bodies-row {
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
      }
      .bodies-header {
        margin-bottom: var(--spacing-sm);
        padding-bottom: var(--spacing-sm);
        border-bottom: 0.0625rem solid #3a3a3a;
      }
      .bodies-row {
        margin: var(--spacing-xs) 0;
      }
      .label-col {
        width: clamp(2.5rem, 6vw, 3.5rem);
        color: #aaa;
        font-size: var(--font-size-xs);
      }
      .body-col {
        flex: 1;
        text-align: center;
        color: #ddd;
        font-size: var(--font-size-sm);
        font-weight: 500;
      }
      .bodies-row .body-col {
        text-align: left;
      }
      .bodies-row input[type="number"] {
        width: 100%;
        height: var(--input-height);
        padding: var(--spacing-xs) var(--spacing-sm);
        background: linear-gradient(135deg, #333 0%, #2a2a2a 100%);
        border: 0.0625rem solid #4a4a4a;
        border-radius: var(--border-radius-sm);
        color: #fff;
        font-size: var(--font-size-xs);
        transition: all 0.25s ease;
      }
      .bodies-row input[type="number"]:focus,
      .input-group input[type="number"]:focus {
        border-color: #5a5a5a;
        outline: none;
        box-shadow: 0 0 0.375rem rgba(100, 100, 100, 0.3);
      }
      .input-group {
        margin: var(--spacing-sm) 0;
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
        flex-wrap: wrap;
      }
      .input-group label {
        width: clamp(3.5rem, 10vw, 4.5rem);
        color: #aaa;
        font-size: var(--font-size-xs);
        flex-shrink: 0;
      }
      .input-group input[type="number"] {
        width: clamp(3.5rem, 12vw, 5rem);
        height: var(--input-height);
        padding: var(--spacing-xs) var(--spacing-sm);
        background: linear-gradient(135deg, #333 0%, #2a2a2a 100%);
        border: 0.0625rem solid #4a4a4a;
        border-radius: var(--border-radius-sm);
        color: #fff;
        font-size: var(--font-size-xs);
        transition: all 0.25s ease;
      }
      .input-group input[type="range"] {
        width: clamp(3.5rem, 15vw, 6rem);
        cursor: pointer;
        -webkit-appearance: none;
        background: #333;
        height: 0.25rem;
        border-radius: 0.125rem;
        transition: all 0.25s ease;
      }
      .input-group input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: clamp(0.75rem, 1.5vw, 1rem);
        height: clamp(0.75rem, 1.5vw, 1rem);
        background: linear-gradient(135deg, #5a5a5a 0%, #4a4a4a 100%);
        border-radius: 50%;
        cursor: pointer;
        border: 0.0625rem solid #6a6a6a;
        transition: all 0.25s ease;
      }
      .input-group input[type="range"]::-webkit-slider-thumb:hover {
        background: linear-gradient(135deg, #6a6a6a 0%, #5a5a5a 100%);
        transform: scale(1.1);
      }
      .input-group span {
        color: #aaa;
        font-size: var(--font-size-xs);
        min-width: clamp(2rem, 6vw, 3.5rem);
        text-align: right;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: clamp(2.25rem, 5vw, 3rem);
        height: clamp(1.25rem, 2.5vw, 1.75rem);
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #3a3a3a 0%, #2a2a2a 100%);
        transition: all 0.3s ease;
        border-radius: 2rem;
        border: 0.0625rem solid #555;
        box-shadow: inset 0 0.125rem 0.25rem rgba(0, 0, 0, 0.3);
      }
      .slider:before {
        position: absolute;
        content: "";
        height: clamp(0.875rem, 1.8vw, 1.25rem);
        width: clamp(0.875rem, 1.8vw, 1.25rem);
        left: 0.125rem;
        bottom: 0.125rem;
        background: linear-gradient(135deg, #fff 0%, #ddd 100%);
        transition: all 0.3s ease;
        border-radius: 50%;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.3);
      }
      input:checked + .slider {
        background: linear-gradient(135deg, #2a6a2a 0%, #1a4a1a 100%);
        border-color: #4caf50;
        box-shadow:
          0 0 0.625rem rgba(76, 175, 80, 0.3),
          inset 0 0.125rem 0.25rem rgba(0, 0, 0, 0.2);
      }
      input:checked + .slider:before {
        transform: translateX(clamp(1rem, 2vw, 1.5rem));
        background: linear-gradient(135deg, #fff 0%, #e8f5e9 100%);
      }
      .feature-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--spacing-sm) var(--spacing-md);
        margin: var(--spacing-sm) 0;
        background: linear-gradient(135deg, #2a2a2a 0%, #252525 100%);
        border-radius: var(--border-radius-sm);
        border: 0.0625rem solid #3a3a3a;
        transition: all 0.25s ease;
      }
      .feature-item:hover {
        background: linear-gradient(135deg, #333 0%, #2a2a2a 100%);
        border-color: #4a4a4a;
      }
      .feature-item label:first-child {
        color: #ddd;
        font-size: var(--font-size-sm);
        font-weight: 500;
      }
      .feature-buttons {
        display: flex;
        gap: var(--spacing-sm);
        flex-wrap: wrap;
        margin: var(--spacing-sm) 0;
      }
      .feature-btn {
        flex: 1 1 calc(50% - var(--spacing-sm));
        min-width: clamp(4rem, 12vw, 6rem);
        height: var(--btn-height);
        padding: 0 var(--spacing-sm);
        background: linear-gradient(135deg, #2a2a2a 0%, #252525 100%);
        color: #888;
        border: 0.0625rem solid #3a3a3a;
        border-radius: var(--border-radius-sm);
        cursor: pointer;
        font-size: var(--font-size-xs);
        font-weight: 500;
        transition: all 0.25s ease;
        text-align: center;
        user-select: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .feature-btn:hover {
        background: linear-gradient(135deg, #3a3a3a 0%, #2a2a2a 100%);
        border-color: #4a4a4a;
        color: #aaa;
      }
      .feature-btn:active {
        transform: scale(0.96);
      }
      .feature-btn.active {
        background: linear-gradient(135deg, #2a5a2a 0%, #1a4a1a 100%);
        border-color: #4caf50;
        color: #fff;
        box-shadow: 0 0 0.5rem rgba(76, 175, 80, 0.3);
      }
      .feature-btn.active:hover {
        background: linear-gradient(135deg, #3a6a3a 0%, #2a5a2a 100%);
        border-color: #5abf5a;
      }
      .feature-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
      .feature-btn:disabled:hover {
        background: linear-gradient(135deg, #2a2a2a 0%, #252525 100%);
        border-color: #3a3a3a;
        color: #888;
      }
      .reset-panel-btn {
        width: 100%;
        height: var(--btn-height);
        padding: 0 var(--spacing-md);
        margin-top: var(--spacing-sm);
        background: linear-gradient(135deg, #3a3a3a 0%, #2a2a2a 100%);
        color: #aaa;
        border: 0.0625rem solid #4a4a4a;
        border-radius: var(--border-radius-sm);
        cursor: pointer;
        font-size: var(--font-size-xs);
        font-weight: 500;
        transition: all 0.25s ease;
      }
      .reset-panel-btn:hover {
        background: linear-gradient(135deg, #4a4a4a 0%, #3a3a3a 100%);
        border-color: #5a5a5a;
        color: #ddd;
        transform: translateY(-0.0625rem);
        box-shadow: 0 0.25rem 0.75rem rgba(0, 0, 0, 0.3);
      }
      .reset-panel-btn:active,
      .reset-panel-btn.success {
        transform: translateY(0);
        box-shadow: none;
        background: linear-gradient(135deg, #2a5a2a 0%, #1a4a1a 100%);
        border-color: #4caf50;
        color: #fff;
      }
      .divider {
        height: 0.0625rem;
        background: linear-gradient(
          90deg,
          transparent,
          #3a3a3a 20%,
          #3a3a3a 80%,
          transparent
        );
        margin: var(--spacing-md) 0;
      }
      .info-text {
        font-size: var(--font-size-xs);
        line-height: 1.6;
        color: #aaa;
      }
      .info-text p {
        margin: var(--spacing-sm) 0;
        padding-left: var(--spacing-xs);
      }
      .info-text strong {
        color: #ddd;
        font-weight: 500;
      }
      .scale-bar-container {
        position: fixed;
        bottom: clamp(3rem, 7vh, 5rem);
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        pointer-events: none;
      }
      .scale-bar {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--spacing-sm);
      }
      .scale-bar-ruler {
        display: flex;
        align-items: center;
        height: clamp(1rem, 2vh, 1.5rem);
        position: relative;
      }
      .scale-bar-line {
        height: clamp(0.125rem, 0.2vh, 0.25rem);
        position: relative;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.5) 15%,
          rgba(255, 255, 255, 1) 50%,
          rgba(255, 255, 255, 0.5) 85%,
          rgba(255, 255, 255, 0) 100%
        );
        box-shadow:
          0 0 0.5rem rgba(255, 255, 255, 0.5),
          0 0 1.25rem rgba(255, 255, 255, 0.2);
        transition: width 0.3s ease;
      }
      .scale-tick {
        position: absolute;
        width: 0.0625rem;
        top: clamp(-0.125rem, -0.3vh, -0.25rem);
        height: clamp(0.5rem, 1vh, 0.75rem);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 0.25rem rgba(255, 255, 255, 0.5);
      }
      .scale-tick.major {
        height: clamp(0.5rem, 1vh, 0.75rem);
        top: clamp(-0.125rem, -0.3vh, -0.25rem);
        width: 0.125rem;
        background: rgba(255, 255, 255, 1);
        box-shadow: 0 0 0.375rem rgba(255, 255, 255, 0.6);
      }
      .scale-tick.minor {
        height: clamp(0.25rem, 0.5vh, 0.375rem);
        top: clamp(-0.0625rem, -0.15vh, -0.125rem);
      }
      .scale-zoom {
        font-size: var(--font-size-xs);
        color: rgba(255, 255, 255, 0.8);
        font-family: "Consolas", "Courier New", monospace;
        text-shadow: 0 0 0.375rem rgba(255, 255, 255, 0.4);
        letter-spacing: 0.0625rem;
      }
      @media (max-width: 1200px) {
        :root {
          --panel-width: clamp(260px, 32vw, 420px);
        }
      }
      @media (max-width: 900px) {
        :root {
          --panel-width: clamp(240px, 45vw, 380px);
          --toggle-btn-size: clamp(2.25rem, 4vw, 3rem);
        }
      }
      @media (max-width: 768px) {
        :root {
          --font-size-base: clamp(11px, 2.5vw, 14px);
          --panel-width: 92vw;
          --panel-max-width: 95vw;
          --toggle-btn-size: clamp(2rem, 5vw, 2.75rem);
          --spacing-md: clamp(0.4rem, 1.5vw, 0.75rem);
          --spacing-lg: clamp(0.5rem, 2vw, 1rem);
        }
        .panel-container {
          top: var(--spacing-sm);
        }
        .panel-container.right {
          right: var(--spacing-sm);
        }
        .panel-container.left {
          left: var(--spacing-sm);
        }
        .panel-base {
          padding: var(--spacing-md);
          padding-top: calc(var(--toggle-btn-size) + var(--spacing-md));
          max-height: 82vh;
        }
        .btn-group {
          flex-wrap: wrap;
        }
        .btn-group button {
          flex: 1 1 calc(50% - var(--spacing-xs));
          min-width: auto;
        }
        .input-group {
          flex-wrap: wrap;
        }
        .input-group label {
          width: 100%;
          margin-bottom: var(--spacing-xs);
        }
        .input-group input[type="number"],
        .input-group input[type="range"] {
          flex: 1;
          min-width: 4rem;
        }
        .feature-btn {
          flex: 1 1 calc(50% - var(--spacing-xs));
        }
      }
      @media (max-width: 480px) {
        :root {
          --font-size-base: clamp(10px, 3vw, 12px);
          --toggle-btn-size: clamp(1.75rem, 6vw, 2.25rem);
          --spacing-md: clamp(0.3rem, 2vw, 0.5rem);
          --spacing-lg: clamp(0.4rem, 2.5vw, 0.75rem);
        }
        .toggle-btn {
          font-size: 1rem;
        }
        .panel-base {
          padding: var(--spacing-sm);
          padding-top: calc(var(--toggle-btn-size) + var(--spacing-sm));
          max-height: 80vh;
          border-radius: var(--border-radius-md);
        }
        .btn-group button,
        .feature-btn {
          flex: 1 1 100%;
        }
        .bodies-container {
          overflow-x: auto;
        }
        .bodies-row input[type="number"] {
          min-width: 3rem;
        }
      }
      @media (max-height: 500px) {
        .panel-base {
          max-height: 75vh;
        }
        .scale-bar-container {
          bottom: var(--spacing-sm);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div class="scale-bar-container" id="scaleBarContainer">
      <div class="scale-bar">
        <div class="scale-bar-ruler">
          <div class="scale-bar-line" id="scaleBarLine"></div>
        </div>
        <div class="scale-zoom" id="scaleZoomIndicator">1.00x</div>
      </div>
    </div>
    <div class="panel-container right" id="panelContainer">
      <button class="toggle-btn" id="togglePanel">⚙</button>
      <div class="panel-base control-panel" id="controlPanel">
        <div class="btn-group">
          <button id="start">开始</button>
          <button id="stop">暂停</button>
          <button id="reset">重置</button>
          <button id="restore">恢复</button>
        </div>
        <div class="bodies-container">
          <div class="bodies-header">
            <div class="label-col"></div>
            <div class="body-col">天体1</div>
            <div class="body-col">天体2</div>
            <div class="body-col">天体3</div>
          </div>
          <div class="bodies-row">
            <div class="label-col">质量</div>

    <script>
      const YOSHIDA = (() => {
        const w1 = 1 / (2 - Math.pow(2, 1 / 3));
        return [w1, w1, 1 - 2 * w1, w1];
      })();

      class GravityCage {
        constructor(config = {}) {
          this.enabled = config.enabled || false;
          this.boundaryRadius = config.boundaryRadius || 1600;
          this.warningRadius = config.warningRadius || 700;
          this.strength = config.strength || 1.0;
          this.exponent = config.exponent || 4;
          this.softening = config.softening || 0.001;
          this.maxMultiplier = config.maxMultiplier || 100;
          this.dampingFactor = config.dampingFactor || 0.1;
          this.center = { x: 0, y: 0 };
          this.cageEnergy = 0;
          this.showBoundaries = false;
          this.userShowBoundaries = false;
          this.boundaryHideTimer = null;
        }

        showBoundariesTemporarily() {
          if (this.userShowBoundaries) return;
          this.showBoundaries = true;
          if (this.boundaryHideTimer) {
            clearTimeout(this.boundaryHideTimer);
          }
          this.boundaryHideTimer = setTimeout(() => {
            if (!this.userShowBoundaries) {
              this.showBoundaries = false;
            }
          }, 5000);
        }

        setUserShowBoundaries(show) {
          this.userShowBoundaries = show;
          this.showBoundaries = show;
          if (show && this.boundaryHideTimer) {
            clearTimeout(this.boundaryHideTimer);
            this.boundaryHideTimer = null;
          }
        }

        updateCenter(com) {
          this.center.x = com.x;
          this.center.y = com.y;
        }

        computeDistance(body, displayScale) {
          const dx = (body.x - this.center.x) / displayScale;
          const dy = (body.y - this.center.y) / displayScale;
          return Math.sqrt(dx * dx + dy * dy);
        }

        computeDamping(body, displayScale) {
          if (!this.enabled) return { dampingX: 0, dampingY: 0 };
          const r = this.computeDistance(body, displayScale);
          const boundaryR = this.boundaryRadius / displayScale;
          const warningR = this.warningRadius / displayScale;
          if (r < warningR) return { dampingX: 0, dampingY: 0 };
          const effectiveR = r - warningR;
          const effectiveBoundary = boundaryR - warningR;
          const ratio = effectiveR / effectiveBoundary;
          const dampingStrength = this.dampingFactor * Math.pow(ratio, 2);
          return {
            dampingX: -dampingStrength * body.dx,
            dampingY: -dampingStrength * body.dy,
          };
        }

        computePotential(body, displayScale) {
          if (!this.enabled) return 0;
          const r = this.computeDistance(body, displayScale);
          const boundaryR = this.boundaryRadius / displayScale;
          const warningR = this.warningRadius / displayScale;
          if (r < warningR) return 0;
          const rNorm = r / boundaryR;
          if (rNorm >= 1 - this.softening) {
            return this.strength * body.m * this.maxMultiplier;
          }
          const effectiveR = r - warningR;
          const effectiveBoundary = boundaryR - warningR;
          const effectiveRNorm = effectiveR / effectiveBoundary;
          const factor =
            Math.pow(effectiveRNorm, this.exponent) /
            (1 - Math.pow(effectiveRNorm, this.exponent) + this.softening);
          return this.strength * body.m * Math.min(factor, this.maxMultiplier);
        }

        computeAcceleration(body, displayScale) {
          if (!this.enabled) return { ax: 0, ay: 0 };
          const dx = (body.x - this.center.x) / displayScale;
          const dy = (body.y - this.center.y) / displayScale;
          const r = Math.sqrt(dx * dx + dy * dy);
          if (r < 1e-10) return { ax: 0, ay: 0 };
          const boundaryR = this.boundaryRadius / displayScale;
          const warningR = this.warningRadius / displayScale;
          const rNorm = r / boundaryR;
          if (r < warningR) return { ax: 0, ay: 0 };
          if (rNorm >= 1 - this.softening) {
            const forceMag = (this.strength * this.maxMultiplier) / r;
            return { ax: (-forceMag * dx) / r, ay: (-forceMag * dy) / r };
          }
          const effectiveR = r - warningR;
          const effectiveBoundary = boundaryR - warningR;
          const effectiveRNorm = effectiveR / effectiveBoundary;
          const rNormExp = Math.pow(effectiveRNorm, this.exponent - 1);
          const denom =
            1 - Math.pow(effectiveRNorm, this.exponent) + this.softening;
          const denomSq = denom * denom;
          const factor =
            (this.exponent * rNormExp) / effectiveBoundary / denomSq;
          const forceMag =
            this.strength * Math.min(factor, this.maxMultiplier / r);
          return { ax: -forceMag * dx, ay: -forceMag * dy };
        }

        computeTotalCageEnergy(bodies, displayScale) {
          if (!this.enabled) return 0;
          let total = 0;
          for (const body of bodies) {
            total += this.computePotential(body, displayScale);
          }
          this.cageEnergy = total;
          return total;
        }

        getBoundaryStatus(body, displayScale) {
          const r = this.computeDistance(body, displayScale);
          const boundaryR = this.boundaryRadius / displayScale;
          const warningR = this.warningRadius / displayScale;
          const rNorm = r / boundaryR;
          const wNorm = r / warningR;
          if (rNorm >= 1 - this.softening) return "critical";
          if (rNorm >= 0.9) return "danger";
          if (wNorm >= 1) return "warning";
          return "safe";
        }

        getEffectiveStrength(body, displayScale) {
          if (!this.enabled) return 0;
          const r = this.computeDistance(body, displayScale);
          const boundaryR = this.boundaryRadius / displayScale;
          const warningR = this.warningRadius / displayScale;
          if (r < warningR) return 0;
          const rNorm = r / boundaryR;
          if (rNorm >= 1 - this.softening) return this.maxMultiplier;
          const effectiveR = r - warningR;
          const effectiveBoundary = boundaryR - warningR;
          const effectiveRNorm = effectiveR / effectiveBoundary;
          const factor =
            Math.pow(effectiveRNorm, this.exponent) /
            (1 - Math.pow(effectiveRNorm, this.exponent) + this.softening);
          return Math.min(factor, this.maxMultiplier);
        }
      }

      function calcKineticEnergy(m, vx, vy) {
        return 0.5 * m * (vx * vx + vy * vy);
      }

      function calcPotentialEnergy(m1, m2, distance, G) {
        return (-G * m1 * m2) / distance;
      }

      function calcAngularMomentum(m, x, y, vx, vy, centerX, centerY) {
        const rx = x - centerX;
        const ry = y - centerY;
        return m * (rx * vy - ry * vx);
      }

      function calcSystemAngularMomentum(bodies, centerX, centerY) {
        let L = 0;
        for (const b of bodies) {
          L += calcAngularMomentum(b.m, b.x, b.y, b.dx, b.dy, centerX, centerY);
        }
        return L;
      }

      function calcSystemEnergy(bodies, G, displayScale) {
        let kinetic = 0;
        let potential = 0;
        for (let i = 0; i < bodies.length; i++) {
          kinetic += calcKineticEnergy(bodies[i].m, bodies[i].dx, bodies[i].dy);
          for (let j = i + 1; j < bodies.length; j++) {
            const dx = (bodies[j].x - bodies[i].x) / displayScale;
            const dy = (bodies[j].y - bodies[i].y) / displayScale;
            const dist = Math.sqrt(dx * dx + dy * dy);
            potential += calcPotentialEnergy(bodies[i].m, bodies[j].m, dist, G);
          }
        }
        return { kinetic, potential, total: kinetic + potential };
      }

      const starColors = ["#ffcc00", "#ff3333", "#aaccff"];
      const starTextureUrls = [
        "medres/ostar.JPG",

      const collisionTextureUrls = [

      function hexToNumber(hex) {
        return parseInt(hex.replace("#", "0x"));
      }

      function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result
          ? {
              r: parseInt(result[1], 16),
              g: parseInt(result[2], 16),
              b: parseInt(result[3], 16),
            }
          : { r: 255, g: 255, b: 255 };
      }

      const createBody = (x, y, dx, dy, m, textureIndex) => ({
        x,
        y,
        dx,

        m,
        r: 5 + m * 2,
        textureIndex,
      });

      class CircularTrail {
        constructor(maxLength) {
          this.xs = new Float64Array(maxLength);
          this.ys = new Float64Array(maxLength);
          this.maxLength = maxLength;
          this.head = 0;
          this.count = 0;
        }
        push(x, y) {
          if (this.count < this.maxLength) {
            this.xs[this.count] = x;
            this.ys[this.count] = y;
            this.count++;
          } else {
            this.xs[this.head] = x;
            this.ys[this.head] = y;
            this.head = (this.head + 1) % this.maxLength;
          }
        }
        get length() {
          return this.count;
        }
        forEach(fn) {
          for (let i = 0; i < this.count; i++) {
            const idx = (this.head + i) % this.count;
            fn(this.xs[idx], this.ys[idx], i);
          }
        }
        clear() {
          this.head = 0;
          this.count = 0;
        }
        resize(newMaxLength) {
          if (newMaxLength === this.maxLength) return;
          const newXs = new Float64Array(newMaxLength);
          const newYs = new Float64Array(newMaxLength);
          const copyCount = Math.min(this.count, newMaxLength);
          const startOffset =
            this.count > newMaxLength ? this.count - newMaxLength : 0;
          for (let i = 0; i < copyCount; i++) {
            const srcIdx = (this.head + startOffset + i) % this.count;
            newXs[i] = this.xs[srcIdx];
            newYs[i] = this.ys[srcIdx];
          }
          this.xs = newXs;
          this.ys = newYs;
          this.maxLength = newMaxLength;
          this.head = 0;
          this.count = copyCount;
        }
      }

      class PixiStarRenderer {
        constructor(app) {
          this.app = app;
          this.glowCache = new Map();
          this.starTextures = [];
          this.loadedColors = [...starColors];
        }

        async loadTextures() {
          const loader = PIXI.Assets;
          for (let i = 0; i < starTextureUrls.length; i++) {
            try {
              const texture = await loader.load(starTextureUrls[i]);
              this.starTextures[i] = texture;
              this.extractDominantColor(texture, i);
            } catch (e) {
              console.warn(`Failed to load texture: ${starTextureUrls[i]}`);
            }
          }
        }

        extractDominantColor(texture, index) {
          const sprite = new PIXI.Sprite(texture);
          const renderTexture = PIXI.RenderTexture.create({
            width: 32,
            height: 32,
          });
          this.app.renderer.render(sprite, { renderTexture });
          const pixels = this.app.renderer.extract.pixels(renderTexture);
          let r = 0,
            g = 0,
            b = 0,
            count = 0;
          for (let i = 0; i < pixels.length; i += 4) {
            const a = pixels[i + 3];
            if (a > 128) {
              r += pixels[i];
              g += pixels[i + 1];
              b += pixels[i + 2];
              count++;
            }
          }
          if (count > 0) {
            r = Math.round(r / count);
            g = Math.round(g / count);
            b = Math.round(b / count);
            this.loadedColors[index] =
              "#" +
              [r, g, b].map((v) => v.toString(16).padStart(2, "0")).join("");
          }
          renderTexture.destroy(true);
          sprite.destroy();
        }

        createGlowTexture(color, baseRadius) {
          const key = `${color}_${baseRadius}`;
          if (this.glowCache.has(key)) return this.glowCache.get(key);

          const size = Math.ceil(baseRadius * 6);
          const graphics = new PIXI.Graphics();
          const cx = size / 2;
          const r = baseRadius;
          const rgb = hexToRgb(color);

          graphics.beginFill((rgb.r << 16) | (rgb.g << 8) | rgb.b, 0.4);
          graphics.drawCircle(cx, cx, r * 3);
          graphics.endFill();

          graphics.beginFill((rgb.r << 16) | (rgb.g << 8) | rgb.b, 0.67);
          graphics.drawCircle(cx, cx, r * 1.5);
          graphics.endFill();

          const renderTexture = PIXI.RenderTexture.create({
            width: size,
            height: size,
          });
          this.app.renderer.render(graphics, { renderTexture });
          graphics.destroy();

          this.glowCache.set(key, renderTexture);
          return renderTexture;
        }

        createStarSprite(body, time) {
          const container = new PIXI.Container();
          const r = body.r;
          const colorIndex = body.textureIndex >= 0 ? body.textureIndex : 0;
          const color = this.loadedColors[colorIndex] || "#ffffff";
          const rgb = hexToRgb(color);
          const colorNum = (rgb.r << 16) | (rgb.g << 8) | rgb.b;

          const glowGraphics = new PIXI.Graphics();
          const steps = 20;
          const maxRadius = r * 1.2;
          for (let i = steps; i >= 0; i--) {
            const ratio = i / steps;
            const alpha = 0.3 * Math.pow(1 - ratio, 2);
            const radius = r + (maxRadius - r) * ratio;
            glowGraphics.beginFill(colorNum, alpha);
            glowGraphics.drawCircle(body.x, body.y, radius);
            glowGraphics.endFill();
          }
          container.addChild(glowGraphics);

          const coreGraphics = new PIXI.Graphics();

          if (this.starTextures[colorIndex]) {
            const coreSprite = new PIXI.Sprite(this.starTextures[colorIndex]);
            coreSprite.width = r * 2;
            coreSprite.height = r * 2;
            coreSprite.anchor.set(0.5);
            coreSprite.x = body.x;
            coreSprite.y = body.y;
            coreSprite.rotation = time * 0.1;
            const mask = new PIXI.Graphics();
            mask.beginFill(0xffffff);
            mask.drawCircle(body.x, body.y, r);
            mask.endFill();
            coreSprite.mask = mask;
            container.addChild(mask);
            container.addChild(coreSprite);
          } else {
            coreGraphics.beginFill(0xffffff);
            coreGraphics.drawCircle(
              body.x - r * 0.2,
              body.y - r * 0.2,
              r * 0.3,
            );
            coreGraphics.endFill();

            coreGraphics.beginFill((rgb.r << 16) | (rgb.g << 8) | rgb.b);
            coreGraphics.drawCircle(body.x, body.y, r);
            coreGraphics.endFill();
          }

          return container;
        }
      }

      class PixiTrailRenderer {
        constructor() {
          this.graphics = new PIXI.Graphics();
        }

        drawTrails(trails, bodies, colors) {
          this.graphics.clear();
          const segments = 240;

          for (let i = 0; i < trails.length; i++) {
            const trail = trails[i];
            if (trail.length < 2) continue;

            const body = bodies[i];
            const colorIndex = body.textureIndex >= 0 ? body.textureIndex : 0;
            const color = colors[colorIndex] || "#ffffff";
            const rgb = hexToRgb(color);
            const colorNum = (rgb.r << 16) | (rgb.g << 8) | rgb.b;

            const len = trail.length;
            const segmentSize = Math.max(1, Math.ceil(len / segments));

            for (let s = 0; s < segments; s++) {
              const start = s === 0 ? 0 : s * segmentSize - 1;
              const end = Math.min(s * segmentSize + segmentSize, len);
              if (start >= len) break;

              const progress = (s * segmentSize + segmentSize / 2) / len;
              const alpha = Math.pow(progress, 0.7) * 0.85;

              this.graphics.lineStyle(2, colorNum, alpha);

              for (let j = start; j < end; j++) {
                const idx = (trail.head + j) % trail.count;
                if (j === start) {
                  this.graphics.moveTo(trail.xs[idx], trail.ys[idx]);
                } else {
                  this.graphics.lineTo(trail.xs[idx], trail.ys[idx]);
                }
              }
            }
          }
        }

        clear() {
          this.graphics.clear();
        }
      }

      class PixiStarField {
        constructor(app) {
          this.app = app;
          this.stars = [];
          this.container = new PIXI.Container();
          this.generate();
        }

        generate() {
          const count = 50 + Math.floor(Math.random() * 151);
          this.stars = [];

          for (let i = 0; i < count; i++) {
            const depth = Math.random();
            const baseSize = 0.3 + Math.random() * 0.7;
            const size = baseSize * (0.3 + depth * 0.7);
            const baseBrightness = 0.6 + Math.random() * 0.4;
            const brightness = baseBrightness * (0.4 + depth * 0.6);

            const colorRand = Math.random();
            let color;
            if (colorRand < 0.6) {
              color = 0xffffff;
            } else if (colorRand < 0.85) {
              color = 0xc8dcff;
            } else if (colorRand < 0.95) {
              color = 0xfff0c8;
            } else {
              color = 0xffc8c8;
            }

            this.stars.push({
              screenX: Math.random(),
              screenY: Math.random(),
              size,
              brightness,
              depth,
              color,
              twinkleFreq: 0.1 + Math.random() * 0.4,
              twinklePhase: Math.random() * Math.PI * 2,
              twinkleAmp: 0.1 + Math.random() * 0.2,
            });
          }
        }

        update(time, viewWidth, viewHeight) {
          this.container.removeChildren();

          for (const star of this.stars) {
            const screenX = star.screenX * viewWidth;
            const screenY = star.screenY * viewHeight;

            const twinkle = Math.sin(
              time * star.twinkleFreq * Math.PI * 2 + star.twinklePhase,
            );
            const currentBrightness =
              star.brightness * (1 + twinkle * star.twinkleAmp);
            const currentSize = star.size * (0.8 + twinkle * 0.1);
            const alpha = Math.min(1, Math.max(0.1, currentBrightness));

            const graphics = new PIXI.Graphics();
            graphics.beginFill(star.color, alpha);
            graphics.drawCircle(screenX, screenY, Math.max(0.5, currentSize));
            graphics.endFill();

            if (star.size > 1.5 && star.depth > 0.6) {
              const glowSize = currentSize * 2;
              graphics.beginFill(star.color, alpha * 0.3);
              graphics.drawCircle(screenX, screenY, glowSize);
              graphics.endFill();
            }

            this.container.addChild(graphics);
          }
        }
      }

      class NBodySim {
        constructor(canvas, bodies, G = 1, displayScale = 200) {
          this.canvas = canvas;
          this.bodies = bodies;
          this.G = G;
          this.displayScale = displayScale;
          this.dt = 0.001;
          this.speedMultiplier = 1;

          this.targetScale = 1;
          this.offsetX = 0;

          this.showTrail = true;

          this.enableCollision = false;
          this.mergingBodies = [];
          this.timer = null;
          this.totalTime = 0;
          this.trailLength = 1000;
          this.trails = bodies.map(() => new CircularTrail(1000));
          this.lastTime = 0;
          this.domUpdateCounter = 0;
          this.domElements = {
            collisionInfo: null,
            collisionType: null,
            mergedMass: null,
            impactSpeed: null,
            momentumX: null,
            momentumY: null,
          };
          this.trailColors = [];
          this.autoZoom = {
            enabled: true,
            sensitivity: 0.01,
            minScale: 0.01,
            maxScale: 100,
            padding: 2,
            smoothing: 0.1,
            paused: false,
            pauseTimer: null,
            resumeDelay: 5000,
          };

          this.initDomElements();
          this.initTrailColors();
          this.gravityCage = new GravityCage({
            enabled: true,
            boundaryRadius: 1600,
            warningRadius: 700,
            strength: 1.0,
            exponent: 4,
            softening: 0.001,
            maxMultiplier: 100,
          });
          const initCom = this.computeCenterOfMass();
          this.gravityCage.updateCenter(initCom);
          this.initState = structuredClone(bodies);
          this.initEvents();
        }

        async initPixi() {
          this.app = new PIXI.Application({
            view: this.canvas,
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: 0x000000,
            antialias: true,
            resolution: window.devicePixelRatio || 1,
            autoDensity: true,
          });

          this.bgSprite = null;
          this.bgImageLoaded = false;
          this.bgLoading = false;
          await this.loadBackgroundImage();

          this.starField = new PixiStarField(this.app);
          this.app.stage.addChild(this.starField.container);

          this.mainContainer = new PIXI.Container();
          this.app.stage.addChild(this.mainContainer);

          this.trailRenderer = new PixiTrailRenderer();
          this.mainContainer.addChild(this.trailRenderer.graphics);

          this.starRenderer = new PixiStarRenderer(this.app);
          await this.starRenderer.loadTextures();

          this.starsContainer = new PIXI.Container();
          this.mainContainer.addChild(this.starsContainer);

          this.cageGraphics = new PIXI.Graphics();
          this.mainContainer.addChild(this.cageGraphics);

          this.comGraphics = new PIXI.Graphics();
          this.mainContainer.addChild(this.comGraphics);

          this.draw();
        }

        async loadBackgroundImage() {
          if (this.bgLoading) return;
          this.bgLoading = true;
          try {
            const bgUrl = "medres/eso0932a (1)-1.JPG";
            const texture = await PIXI.Assets.load(bgUrl);
            if (this.bgSprite) {
              this.app.stage.removeChild(this.bgSprite);
              this.bgSprite.destroy();
              this.bgSprite = null;
            }
            this.bgSprite = new PIXI.Sprite(texture);
            this.bgSprite.alpha = 0.3;
            this.bgImageLoaded = true;
            this.bgLoading = false;
            this.updateBackgroundSize();
            this.app.stage.addChildAt(this.bgSprite, 0);
          } catch (e) {
            this.bgLoading = false;
            console.warn("Failed to load background image", e);
          }
        }

        updateBackgroundSize() {
          if (!this.bgSprite || !this.bgImageLoaded) return;
          const canvasWidth = window.innerWidth;
          const canvasHeight = window.innerHeight;
          const textureWidth = this.bgSprite.texture.width;
          const textureHeight = this.bgSprite.texture.height;

          const scaleX = canvasWidth / textureWidth;
          const scaleY = canvasHeight / textureHeight;
          const scale = Math.max(scaleX, scaleY);

          this.bgSprite.width = textureWidth * scale;
          this.bgSprite.height = textureHeight * scale;
          this.bgSprite.x = (canvasWidth - this.bgSprite.width) / 2;
          this.bgSprite.y = (canvasHeight - this.bgSprite.height) / 2;
        }

        initDomElements() {
          const ids = [
            "timeDisplay",
            "collisionInfo",
            "collisionType",
            "mergedMass",
            "impactSpeed",
            "momentumX",
            "momentumY",
          ];
          for (const id of ids) {
            this.domElements[id] = document.getElementById(id);
          }
        }

        initTrailColors() {
          for (let i = 0; i < this.bodies.length; i++) {
            const body = this.bodies[i];
            const color =
              body.textureIndex >= 0
                ? starColors[body.textureIndex]
                : body.color || "#ffffff";
            this.trailColors[i] = color;
          }
        }

        updateTrailColors() {
          for (let i = 0; i < this.bodies.length; i++) {
            const body = this.bodies[i];
            const color =
              body.textureIndex >= 0
                ? this.starRenderer?.loadedColors[body.textureIndex] ||
                  starColors[body.textureIndex]
                : body.color || "#ffffff";
            this.trailColors[i] = color;
          }
        }

        resize() {
          if (this.app) {
            this.app.renderer.resize(window.innerWidth, window.innerHeight);
            this.updateBackgroundSize();
          }
          this.draw();
        }

        initEvents() {
          const c = this.canvas;
          c.addEventListener("wheel", (e) => {
            e.preventDefault();
            this.pauseAutoZoom();
            const com = this.computeCenterOfMass();
            const screenX = com.x * this.scale + this.offsetX;
            const screenY = com.y * this.scale + this.offsetY;
            const s = Math.max(
              0.01,
              Math.min(100, this.scale * (e.deltaY > 0 ? 0.9 : 1.1)),
            );
            this.scale = s;
            this.targetScale = s;
            this.offsetX = screenX - com.x * this.scale;
            this.offsetY = screenY - com.y * this.scale;
            this.draw();
          });
        }

        pauseAutoZoom() {
          const az = this.autoZoom;
          if (!az.enabled) return;
          az.paused = true;
          if (az.pauseTimer) {
            clearTimeout(az.pauseTimer);
          }
          az.pauseTimer = setTimeout(() => {
            az.paused = false;
            az.pauseTimer = null;
          }, az.resumeDelay);
        }

        computeCenterOfMass() {
          const bodies = this.bodies;
          let totalMass = 0,
            massWeightedX = 0,
            massWeightedY = 0;
          for (let i = 0; i < bodies.length; i++) {
            const body = bodies[i];
            totalMass += body.m;
            massWeightedX += body.m * body.x;
            massWeightedY += body.m * body.y;
          }
          return { x: massWeightedX / totalMass, y: massWeightedY / totalMass };
        }

        computeAcc(body, bodies) {
          const ds = this.displayScale;
          const minDist = 0.5;
          const minSq = minDist * minDist;
          let ax = 0,
            ay = 0;
          for (let i = 0; i < bodies.length; i++) {
            const b = bodies[i];
            if (b === body) continue;
            const dx = (b.x - body.x) / ds;
            const dy = (b.y - body.y) / ds;
            let distSq = dx * dx + dy * dy;
            if (this.useMinDist) distSq = Math.max(distSq, minSq);
            const dist = Math.sqrt(distSq);
            const force = (this.G * b.m) / (dist * distSq);
            ax += force * dx;
            ay += force * dy;
          }
          return { ax, ay };
        }

        computeCageAccelerations() {
          if (!this.gravityCage.enabled) return null;
          const accelerations = [];
          let totalForceX = 0;
          let totalForceY = 0;
          let totalMass = 0;
          for (let i = 0; i < this.bodies.length; i++) {
            const body = this.bodies[i];
            const cageAcc = this.gravityCage.computeAcceleration(
              body,
              this.displayScale,
            );
            const damping = this.gravityCage.computeDamping(
              body,
              this.displayScale,
            );
            accelerations.push({
              ax: cageAcc.ax + damping.dampingX,
              ay: cageAcc.ay + damping.dampingY,
            });
            totalForceX += (cageAcc.ax + damping.dampingX) * body.m;
            totalForceY += (cageAcc.ay + damping.dampingY) * body.m;
            totalMass += body.m;
          }
          const compensationAx = -totalForceX / totalMass;
          const compensationAy = -totalForceY / totalMass;
          for (let i = 0; i < accelerations.length; i++) {
            accelerations[i].ax += compensationAx;
            accelerations[i].ay += compensationAy;
          }
          return accelerations;
        }

        step() {
          const bodies = this.bodies;
          const dt = this.dt;
          const displayScale = this.displayScale;
          const yoshidaCoeffs = YOSHIDA;
          if (this.gravityCage.enabled) {
            const com = this.computeCenterOfMass();
            this.gravityCage.updateCenter(com);
          }
          for (
            let stepIndex = 0;
            stepIndex < yoshidaCoeffs.length;
            stepIndex++
          ) {
            const w = yoshidaCoeffs[stepIndex];
            const h = dt * w;
            const cageAccs = this.computeCageAccelerations();
            for (let i = 0; i < bodies.length; i++) {
              const body = bodies[i];
              const acc = this.computeAcc(body, bodies);
              let ax = acc.ax;
              let ay = acc.ay;
              if (cageAccs) {
                ax += cageAccs[i].ax;
                ay += cageAccs[i].ay;
              }
              body.dx += ax * h;
              body.dy += ay * h;
            }
            for (let i = 0; i < bodies.length; i++) {
              const body = bodies[i];
              body.x += body.dx * h * displayScale;
              body.y += body.dy * h * displayScale;
            }
          }
          this.totalTime += dt;
          this.updateTrails();
          if (this.enableCollision) {
            this.checkCollisions();
          }
        }

        checkBoundaryBreach() {
          if (!this.gravityCage.enabled) return false;
          const boundaryR = this.gravityCage.boundaryRadius;
          for (const body of this.bodies) {
            const dist = this.gravityCage.computeDistance(
              body,
              this.displayScale,
            );
            if (dist >= boundaryR / this.displayScale) {
              return true;
            }
          }
          return false;
        }

        checkCollisions() {
          const bodies = this.bodies;
          for (let i = 0; i < bodies.length; i++) {
            for (let j = i + 1; j < bodies.length; j++) {
              const b1 = bodies[i];
              const b2 = bodies[j];
              const dx = b2.x - b1.x;
              const dy = b2.y - b1.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              const collisionThreshold = b1.r + b2.r;
              if (dist < collisionThreshold && dist > 0) {
                const totalMass = b1.m + b2.m;
                const newBody = {
                  x: (b1.x * b1.m + b2.x * b2.m) / totalMass,
                  y: (b1.y * b1.m + b2.y * b2.m) / totalMass,
                  dx: (b1.dx * b1.m + b2.dx * b2.m) / totalMass,
                  dy: (b1.dy * b1.m + b2.dy * b2.m) / totalMass,
                  m: totalMass,
                  r: Math.pow(Math.pow(b1.r, 3) + Math.pow(b2.r, 3), 1 / 3),
                  textureIndex: -1,
                  color: b1.m >= b2.m ? b1.color : b2.color,
                };
                bodies.splice(j, 1);
                bodies[i] = newBody;
                this.trails.splice(j, 1);
                this.trails[i] = new CircularTrail(this.trailLength);
                this.lastCollisionInfo = {
                  type: "merge",
                  impactSpeed: Math.sqrt(
                    Math.pow(b2.dx - b1.dx, 2) + Math.pow(b2.dy - b1.dy, 2),
                  ),
                  mergedMass: totalMass,
                  momentumX: totalMass * newBody.dx,
                  momentumY: totalMass * newBody.dy,
                };
                return;
              }
            }
          }
        }

        updateTrails() {
          if (!this.showTrail) return;
          for (let i = 0; i < this.bodies.length; i++) {
            const body = this.bodies[i];
            this.trails[i].push(body.x, body.y);
          }
        }

        draw() {
          if (!this.app) return;

          const time = performance.now() * 0.001;
          this.lastTime = time;

          if (this.starField) {
            this.starField.update(
              time,
              this.app.screen.width,
              this.app.screen.height,
            );
          }

          this.mainContainer.position.set(this.offsetX, this.offsetY);
          this.mainContainer.scale.set(this.scale, this.scale);

          if (this.showTrail && this.trailRenderer) {
            this.updateTrailColors();
            this.trailRenderer.drawTrails(
              this.trails,
              this.bodies,
              this.trailColors,
            );
          } else if (this.trailRenderer) {
            this.trailRenderer.clear();
          }

          this.starsContainer.removeChildren();
          for (const b of this.bodies) {
            if (this.starRenderer) {
              const starContainer = this.starRenderer.createStarSprite(b, time);
              this.starsContainer.addChild(starContainer);
            }
          }

          this.drawCageBoundaries(time);
          this.drawCenterOfMass(time);

          this.domUpdateCounter++;
          if (this.domUpdateCounter >= 10) {
            this.domUpdateCounter = 0;
            this.updateTimeDisplay();
            this.updateEnergyDisplay();
          }
        }

        drawCageBoundaries(time) {
          this.cageGraphics.clear();
          if (!this.gravityCage.enabled || !this.gravityCage.showBoundaries)
            return;

          const cage = this.gravityCage;
          const cx = cage.center.x;
          const cy = cage.center.y;
          const warningR = cage.warningRadius;
          const boundaryR = cage.boundaryRadius;

          this.cageGraphics.lineStyle(
            2 / this.scale,
            0xffc832,
            0.3 + Math.sin(time * 2) * 0.1,
          );
          this.cageGraphics.drawCircle(cx, cy, warningR);

          const pulseIntensity = 0.4 + Math.sin(time * 3) * 0.2;
          this.cageGraphics.lineStyle(3 / this.scale, 0xff3232, pulseIntensity);
          this.cageGraphics.drawCircle(cx, cy, boundaryR);
        }

        drawCenterOfMass(time) {
          this.comGraphics.clear();
          if (!this.showCom) return;

          const com = this.computeCenterOfMass();
          const comRadius = 6;
          const pulse = 1 + Math.sin(time * 3) * 0.15;

          this.comGraphics.beginFill(0x00ffff, 0.3);
          this.comGraphics.drawCircle(com.x, com.y, comRadius * 6 * pulse);
          this.comGraphics.endFill();

          this.comGraphics.beginFill(0xffffff, 0.9);
          this.comGraphics.drawCircle(com.x, com.y, comRadius);
          this.comGraphics.endFill();

          this.comGraphics.lineStyle(1.5, 0x00ffff, 0.8);
          this.comGraphics.drawCircle(com.x, com.y, comRadius);
        }

        updateTimeDisplay() {
          const el = this.domElements.timeDisplay;
          if (!el) return;
          let t = this.totalTime;
          if (t < 60) {
            el.textContent = t.toFixed(2) + "秒";
          } else if (t < 3600) {
            const m = Math.floor(t / 60);
            const s = (t % 60).toFixed(1);
            el.textContent = m + "分" + s + "秒";
          } else {
            const h = Math.floor(t / 3600);
            const m = Math.floor((t % 3600) / 60);
            const s = ((t % 3600) % 60).toFixed(0);
            el.textContent = h + "时" + m + "分" + s + "秒";
          }
        }

        updateEnergyDisplay() {
          if (this.lastCollisionInfo) {
            const {
              collisionInfo,
              collisionType,
              mergedMass,
              impactSpeed,
              momentumX,
              momentumY,
            } = this.domElements;
            if (collisionInfo) collisionInfo.style.display = "block";
            if (collisionType) collisionType.textContent = "合并";
            if (mergedMass)
              mergedMass.textContent =
                this.lastCollisionInfo.mergedMass.toFixed(4);
            if (impactSpeed)
              impactSpeed.textContent =
                this.lastCollisionInfo.impactSpeed.toFixed(4);
            if (momentumX)
              momentumX.textContent =
                this.lastCollisionInfo.momentumX.toFixed(4);
            if (momentumY)
              momentumY.textContent =
                this.lastCollisionInfo.momentumY.toFixed(4);
          }
        }

        run() {
          const sim = this;
          function frame() {
            for (let i = 0; i < sim.speedMultiplier; i++) {
              sim.step();
            }
            sim.centerOnCom();
            sim.updateAutoZoom();
            sim.draw();
            sim.timer = requestAnimationFrame(frame);
          }
          frame();
        }

        autoReset(reason) {
          const newBodies = generateRandomBodies();
          this.bodies = newBodies;
          this.totalTime = 0;
          this.trails = newBodies.map(
            () => new CircularTrail(this.trailLength),
          );
          this.scale = 1;
          this.initState = structuredClone(newBodies);
          const com = this.computeCenterOfMass();
          this.gravityCage.updateCenter(com);
          this.centerOnCom();
          updateControlPanel(newBodies);
          this.draw();
        }

        start() {
          if (!this.timer) this.run();
        }
        stop() {
          cancelAnimationFrame(this.timer);
          this.timer = null;
        }

        centerOnCom() {
          const com = this.computeCenterOfMass();
          this.offsetX = this.app.screen.width / 2 - com.x * this.scale;
          this.offsetY = this.app.screen.height / 2 - com.y * this.scale;
        }

        computeBoundingSphere() {
          const bodies = this.bodies;
          if (bodies.length === 0)
            return { centerX: 0, centerY: 0, radius: 100 };
          if (bodies.length === 1) {
            return {
              centerX: bodies[0].x,
              centerY: bodies[0].y,
              radius: bodies[0].r + 50,
            };
          }
          const com = this.computeCenterOfMass();
          let maxDist = 0;
          for (const body of bodies) {
            const dx = body.x - com.x;
            const dy = body.y - com.y;
            const dist = Math.sqrt(dx * dx + dy * dy) + body.r;
            if (dist > maxDist) maxDist = dist;
          }
          return {
            centerX: com.x,
            centerY: com.y,
            radius: Math.max(maxDist, 50),
          };
        }

        computeMaxBodyDistance() {
          const bodies = this.bodies;
          let maxDist = 0;
          for (let i = 0; i < bodies.length; i++) {
            for (let j = i + 1; j < bodies.length; j++) {
              const dx = bodies[j].x - bodies[i].x;
              const dy = bodies[j].y - bodies[i].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist > maxDist) maxDist = dist;
            }
          }
          return maxDist;
        }

        computeTargetScale() {
          const az = this.autoZoom;
          if (!az.enabled) return this.scale;
          const bounding = this.computeBoundingSphere();
          const canvasSize = Math.min(
            this.app.screen.width,
            this.app.screen.height,
          );
          const targetRadius = bounding.radius * az.padding;
          let targetScale = (canvasSize * 0.45) / targetRadius;
          targetScale = Math.max(
            az.minScale,
            Math.min(az.maxScale, targetScale),
          );
          return targetScale;
        }

        updateAutoZoom() {
          const az = this.autoZoom;
          if (!az.enabled || az.paused) return;
          this.targetScale = this.computeTargetScale();
          const diff = this.targetScale - this.scale;
          if (Math.abs(diff) > 0.0001) {
            const step = diff * az.sensitivity;
            this.scale += step;
            const com = this.computeCenterOfMass();
            const screenX = this.app.screen.width / 2;
            const screenY = this.app.screen.height / 2;
            this.offsetX = screenX - com.x * this.scale;
            this.offsetY = screenY - com.y * this.scale;
          }
        }
      }

      const canvas = document.getElementById("canvas");
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const scale = 200;

      function generateRandomBodies() {
        const G = 1;
        const bodies = [];
        const masses = [];
        const positions = [];
        const velocities = [];

        for (let i = 0; i < 3; i++) {
          const mass = 0.5 + Math.random() * 4.5;
          masses.push(mass);
          const angle = (i * 2 * Math.PI) / 3 + Math.random() * 0.5;
          const radius = 200 + Math.random() * 300;
          positions.push({
            x: cx + radius * Math.cos(angle),
            y: cy + radius * Math.sin(angle),
          });
        }

        let potentialEnergy = 0;
        for (let i = 0; i < 3; i++) {
          for (let j = i + 1; j < 3; j++) {
            const dx = (positions[j].x - positions[i].x) / scale;
            const dy = (positions[j].y - positions[i].y) / scale;
            const dist = Math.max(Math.sqrt(dx * dx + dy * dy), 0.5);
            potentialEnergy -= (G * masses[i] * masses[j]) / dist;
          }
        }

        const targetKinetic = Math.abs(potentialEnergy) * 0.3;
        const kineticPerBody = targetKinetic / 3;

        for (let i = 0; i < 3; i++) {
          const speed = Math.sqrt((2 * kineticPerBody) / masses[i]);
          const velAngle = Math.random() * 2 * Math.PI;
          velocities.push({
            dx: speed * Math.cos(velAngle),
            dy: speed * Math.sin(velAngle),
          });
        }

        const totalMomentumX = masses.reduce(
          (sum, m, i) => sum + m * velocities[i].dx,
          0,
        );
        const totalMomentumY = masses.reduce(
          (sum, m, i) => sum + m * velocities[i].dy,
          0,
        );
        for (let i = 0; i < 3; i++) {
          velocities[i].dx -= totalMomentumX / (3 * masses[i]);
          velocities[i].dy -= totalMomentumY / (3 * masses[i]);
        }

        for (let i = 0; i < 3; i++) {
          bodies.push(
            createBody(
              positions[i].x,
              positions[i].y,
              velocities[i].dx,
              velocities[i].dy,
              masses[i],
              i,
            ),
          );
        }
        return bodies;
      }

      const bodies = generateRandomBodies();
      const sim = new NBodySim(canvas, bodies, 1, scale);

      function updateControlPanel(bodies) {
        bodies.forEach((b, i) => {
          document.getElementById(`m${i + 1}`).value = b.m.toFixed(2);
          document.getElementById(`v${i + 1}x`).value = b.dx.toFixed(4);
          document.getElementById(`v${i + 1}y`).value = b.dy.toFixed(4);
        });
      }

      sim.initPixi().then(() => {
        sim.centerOnCom();
        sim.draw();
        updateControlPanel(bodies);
        sim.start();
      });

      const toggleBtn = document.getElementById("togglePanel");
      const controlPanel = document.getElementById("controlPanel");
      const panelContainer = document.getElementById("panelContainer");
      let panelExpanded = false;

      let isDragging = false;
      let hasMoved = false;
      let dragStartX, dragStartY, containerStartX, containerStartY;

      panelContainer.addEventListener("mousedown", (e) => {
        if (e.target.tagName === "INPUT") return;
        isDragging = true;
        hasMoved = false;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        const rect = panelContainer.getBoundingClientRect();
        containerStartX = rect.left;
        containerStartY = rect.top;
        panelContainer.style.cursor = "grabbing";
      });

      document.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        const deltaX = e.clientX - dragStartX;
        const deltaY = e.clientY - dragStartY;
        if (Math.abs(deltaX) > 3 || Math.abs(deltaY) > 3) {
          hasMoved = true;
        }
        const newX = containerStartX + deltaX;
        const newY = containerStartY + deltaY;
        panelContainer.style.left = newX + "px";
        panelContainer.style.top = newY + "px";
        panelContainer.style.right = "auto";
        panelContainer.style.transform = "none";
      });

      document.addEventListener("mouseup", () => {
        if (isDragging) {
          isDragging = false;
          panelContainer.style.cursor = "move";
        }
      });

      toggleBtn.addEventListener("click", (e) => {
        if (hasMoved) {
          hasMoved = false;
          return;
        }
        e.stopPropagation();
        panelExpanded = !panelExpanded;
        controlPanel.classList.toggle("show", panelExpanded);
        toggleBtn.classList.toggle("expanded", panelExpanded);
        toggleBtn.textContent = panelExpanded ? "✕" : "⚙";
      });

      document.getElementById("start").onclick = () => sim.start();
      document.getElementById("stop").onclick = () => sim.stop();

      function resetSimulation(newBodies) {
        sim.stop();
        sim.bodies = newBodies;
        sim.totalTime = 0;
        sim.trails = newBodies.map(() => new CircularTrail(sim.trailLength));
        sim.scale = 1;
        sim.centerOnCom();
        updateControlPanel(newBodies);
        sim.draw();
      }

      document.getElementById("reset").onclick = () => {
        const currentG = sim.G;
        const currentDt = sim.dt;
        const currentSpeed = sim.speedMultiplier;
        const newBodies = generateRandomBodies();
        sim.initState = structuredClone(newBodies);
        resetSimulation(newBodies);
        sim.G = currentG;
        sim.dt = currentDt;
        sim.speedMultiplier = currentSpeed;
        sim.start();
      };

      document.getElementById("restore").onclick = () => {
        resetSimulation(structuredClone(sim.initState));
        sim.start();
      };

      document.getElementById("speedRange").oninput = (e) => {
        document.getElementById("speedVal").textContent = e.target.value + "x";
        document.getElementById("speedInput").value = e.target.value;
        sim.speedMultiplier = +e.target.value;
      };
      document.getElementById("speedInput").oninput = (e) => {
        let val = Math.max(1, Math.min(50, +e.target.value || 1));
        document.getElementById("speedVal").textContent = val + "x";
        document.getElementById("speedRange").value = val;
        sim.speedMultiplier = val;
      };
      document.getElementById("btnTrail").onclick = (e) => {
        sim.showTrail = !sim.showTrail;
        e.target.classList.toggle("active", sim.showTrail);
      };
      function updatePhysicsRealismButton() {
        const isPhysicsRealism =
          !sim.useMinDist && sim.enableCollision && !sim.gravityCage.enabled;
        document
          .getElementById("btnCom")
          .classList.toggle("active", isPhysicsRealism);
      }
      document.getElementById("btnCom").onclick = (e) => {
        const isActive = e.target.classList.toggle("active");
        if (isActive) {
          sim._savedUseMinDist = sim.useMinDist;
          sim._savedEnableCollision = sim.enableCollision;
          sim._savedCageEnabled = sim.gravityCage.enabled;
          sim.useMinDist = false;
          sim.enableCollision = true;
          sim.gravityCage.enabled = false;
          document.getElementById("btnMinDist").classList.remove("active");
          document.getElementById("btnCollision").classList.add("active");
          document.getElementById("btnCageEnabled").classList.remove("active");
        } else {
          sim.useMinDist =
            sim._savedUseMinDist !== undefined ? sim._savedUseMinDist : true;
          sim.enableCollision =
            sim._savedEnableCollision !== undefined
              ? sim._savedEnableCollision
              : false;
          sim.gravityCage.enabled =
            sim._savedCageEnabled !== undefined ? sim._savedCageEnabled : true;
          document
            .getElementById("btnMinDist")
            .classList.toggle("active", sim.useMinDist);
          document
            .getElementById("btnCollision")
            .classList.toggle("active", sim.enableCollision);
          document
            .getElementById("btnCageEnabled")
            .classList.toggle("active", sim.gravityCage.enabled);
        }
      };
      document.getElementById("btnMinDist").onclick = (e) => {
        sim.useMinDist = !sim.useMinDist;
        e.target.classList.toggle("active", sim.useMinDist);
        updatePhysicsRealismButton();
      };
      document.getElementById("btnCollision").onclick = (e) => {
        sim.enableCollision = !sim.enableCollision;
        e.target.classList.toggle("active", sim.enableCollision);
        updatePhysicsRealismButton();
      };
      document.getElementById("trailLength").oninput = (e) => {
        let val = Math.max(10, Math.min(5000, +e.target.value || 100));
        document.getElementById("trailLengthVal").textContent = val;
        document.getElementById("trailLengthRange").value = val;
        sim.trailLength = val;
        sim.trails.forEach((trail) => trail.resize(val));
      };
      document.getElementById("trailLengthRange").oninput = (e) => {
        let val = Math.max(10, Math.min(5000, +e.target.value || 100));
        document.getElementById("trailLengthVal").textContent = val;
        document.getElementById("trailLength").value = val;
        sim.trailLength = val;
        sim.trails.forEach((trail) => trail.resize(val));
      };

      function updateBodyParams() {
        const getVal = (id) => +document.getElementById(id).value || 0;
        sim.bodies.forEach((b, i) => {
          b.m = getVal(`m${i + 1}`) || 1;
          b.dx = getVal(`v${i + 1}x`);
          b.dy = getVal(`v${i + 1}y`);
          b.r = 5 + b.m * 2;
        });
        sim.G = getVal("gravity") || 1;
        if (!sim.timer) sim.draw();
      }

      [
        "m1",
        "m2",
        "m3",
        "v1x",
        "v1y",
        "v2x",
        "v2y",
        "v3x",
        "v3y",
        "gravity",
      ].forEach((id) => {
        document.getElementById(id).oninput = updateBodyParams;
      });

      document.getElementById("btnCageEnabled").onclick = (e) => {
        sim.gravityCage.enabled = !sim.gravityCage.enabled;
        e.target.classList.toggle("active", sim.gravityCage.enabled);
        if (sim.gravityCage.enabled) {
          const com = sim.computeCenterOfMass();
          sim.gravityCage.updateCenter(com);
          sim.gravityCage.showBoundariesTemporarily();
        }
        if (!sim.timer) sim.draw();
        updatePhysicsRealismButton();
      };

      document.getElementById("btnCageShowBoundaries").onclick = (e) => {
        const newState = !sim.gravityCage.userShowBoundaries;
        sim.gravityCage.setUserShowBoundaries(newState);
        e.target.classList.toggle("active", newState);
        if (!sim.timer) sim.draw();
      };

      const syncCageParam = (
        id,
        rangeId,
        prop,
        parser = parseFloat,
        showBoundary = false,
      ) => {
        const input = document.getElementById(id);
        const range = document.getElementById(rangeId);
        const update = (v) => {
          const val = parser(v);
          sim.gravityCage[prop] = val;
          if (input) input.value = val;
          if (range) range.value = val;
          if (showBoundary) {
            sim.gravityCage.showBoundariesTemporarily();
          }
          if (!sim.timer) sim.draw();
        };
        if (input) input.oninput = (e) => update(e.target.value);
        if (range) range.oninput = (e) => update(e.target.value);
      };

      syncCageParam(
        "cageBoundary",
        "cageBoundaryRange",
        "boundaryRadius",
        parseInt,
        true,
      );
      syncCageParam(
        "cageWarning",
        "cageWarningRange",
        "warningRadius",
        parseInt,
        true,
      );

      document.getElementById("btnAutoZoom").onclick = (e) => {
        sim.autoZoom.enabled = !sim.autoZoom.enabled;
        e.target.classList.toggle("active", sim.autoZoom.enabled);
        if (!sim.timer) sim.draw();
      };

      document.getElementById("resetGravityCage").onclick = (e) => {
        const btn = e.target;
        btn.style.background =
          "linear-gradient(135deg, #2a5a2a 0%, #1a4a1a 100%)";
        btn.style.borderColor = "#4caf50";
        btn.style.color = "#fff";
        setTimeout(() => {
          btn.style.background = "";
          btn.style.borderColor = "";
          btn.style.color = "";
        }, 200);
        document.getElementById("btnCageEnabled").classList.add("active");
        document
          .getElementById("btnCageShowBoundaries")
          .classList.remove("active");
        sim.gravityCage.enabled = true;
        const defaults = {
          boundaryRadius: 1600,
          warningRadius: 700,
        };
        sim.gravityCage.boundaryRadius = defaults.boundaryRadius;
        sim.gravityCage.warningRadius = defaults.warningRadius;
        document.getElementById("cageBoundary").value = defaults.boundaryRadius;
        document.getElementById("cageBoundaryRange").value =
          defaults.boundaryRadius;
        document.getElementById("cageWarning").value = defaults.warningRadius;
        document.getElementById("cageWarningRange").value =
          defaults.warningRadius;
        sim.gravityCage.setUserShowBoundaries(false);
        if (!sim.timer) sim.draw();
      };

      const ScaleBar = {
        lineEl: null,
        zoomEl: null,
        baseWidth: 0,
        currentWidth: 0,
        targetWidth: 0,
        lastScale: 1,
        init() {
          this.lineEl = document.getElementById("scaleBarLine");
          this.zoomEl = document.getElementById("scaleZoomIndicator");
          this.baseWidth = window.innerWidth / 2;
          this.currentWidth = this.baseWidth;
          this.targetWidth = this.baseWidth;
          this.update(1);
        },
        update(scale) {
          if (!this.lineEl) return;
          const scaleDiff = Math.abs(scale - this.lastScale);
          if (
            scaleDiff < 0.001 &&
            Math.abs(this.currentWidth - this.targetWidth) < 1
          ) {
            return;
          }
          this.lastScale = scale;
          this.targetWidth = this.baseWidth * scale;
          this.currentWidth += (this.targetWidth - this.currentWidth) * 0.2;
          if (Math.abs(this.currentWidth - this.targetWidth) < 1) {
            this.currentWidth = this.targetWidth;
          }
          this.lineEl.style.width = this.currentWidth + "px";
          if (this.zoomEl) {
            this.zoomEl.textContent = scale.toFixed(2) + "x";
          }
        },
      };

      ScaleBar.init();

      setInterval(() => {
        ScaleBar.update(sim.scale);
      }, 100);

      window.addEventListener("resize", () => sim.resize());
    </script>
  </body>
</html>
